<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Tests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  .summary { font-size: 14px; margin-bottom: 16px; padding: 8px 12px; border-radius: 6px; font-family: monospace; }
  .summary.pass { background: #1a3a1a; color: #6fc66f; border: 1px solid #2a5a2a; }
  .summary.fail { background: #3a1a1a; color: #f66; border: 1px solid #5a2a2a; }
  .summary.running { background: #1a1a3a; color: #6af; border: 1px solid #2a2a5a; }
  .group { margin-bottom: 12px; }
  .group-header { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .test { font-size: 13px; padding: 3px 0; font-family: monospace; }
  .test.pass { color: #6fc66f; }
  .test.pass::before { content: '\2713 '; }
  .test.fail { color: #f66; }
  .test.fail::before { content: '\2717 '; }
  .test.skip { color: #888; }
  .test.skip::before { content: '- '; }
  .error { color: #f99; font-size: 11px; margin-left: 20px; }
  iframe { display: none; }
</style>
</head>
<body>
<h1>Dashboard Behavioral Tests</h1>
<div class="summary running" id="summary">Running...</div>
<div id="results"></div>

<iframe id="frame" src="dashboard.html" width="1024" height="768"></iframe>

<script>
(function() {
  var results = [];
  var frame = document.getElementById('frame');

  function $(sel, root) { return (root || doc).querySelector(sel); }
  function $$(sel, root) { return Array.from((root || doc).querySelectorAll(sel)); }
  var doc; // set once iframe loads

  function assert(name, group, fn) {
    try {
      var result = fn();
      if (result === false) throw new Error('assertion returned false');
      results.push({ name: name, group: group, pass: true });
    } catch(e) {
      results.push({ name: name, group: group, pass: false, error: e.message });
    }
  }

  function renderResults() {
    var el = document.getElementById('results');
    var passed = results.filter(function(r) { return r.pass; }).length;
    var failed = results.filter(function(r) { return !r.pass; }).length;
    var summary = document.getElementById('summary');
    summary.textContent = passed + ' passed, ' + failed + ' failed, ' + results.length + ' total';
    summary.className = 'summary ' + (failed > 0 ? 'fail' : 'pass');

    var groups = {};
    results.forEach(function(r) {
      (groups[r.group] = groups[r.group] || []).push(r);
    });

    var html = '';
    Object.keys(groups).forEach(function(g) {
      html += '<div class="group"><div class="group-header">' + g + '</div>';
      groups[g].forEach(function(r) {
        html += '<div class="test ' + (r.pass ? 'pass' : 'fail') + '">' + r.name + '</div>';
        if (r.error) html += '<div class="error">' + r.error + '</div>';
      });
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function waitForDashboard(cb) {
    var attempts = 0;
    var check = setInterval(function() {
      attempts++;
      try {
        doc = frame.contentDocument || frame.contentWindow.document;
        var entries = doc.querySelectorAll('.entry');
        var greeting = doc.getElementById('greeting');
        if (entries.length > 0 && greeting && greeting.textContent.length > 5) {
          clearInterval(check);
          cb();
        } else if (attempts > 100) {
          clearInterval(check);
          results.push({ name: 'Dashboard loaded', group: 'Setup', pass: false, error: 'Timed out waiting for dashboard to render (' + entries.length + ' entries, greeting: "' + (greeting ? greeting.textContent : 'null') + '")' });
          renderResults();
        }
      } catch(e) {
        if (attempts > 100) {
          clearInterval(check);
          results.push({ name: 'Dashboard loaded', group: 'Setup', pass: false, error: 'iframe access error: ' + e.message });
          renderResults();
        }
      }
    }, 100);
  }

  function simulateClick(el) {
    el.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
  }

  function simulateKey(key, target) {
    (target || doc).dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
  }

  function runTests() {
    var win = frame.contentWindow;

    // ===== RENDERING =====

    var allEntries = $$('.entry');
    assert('Entries rendered (>0)', 'Rendering', function() {
      return allEntries.length > 0;
    });

    assert('Hero line shows last completed project', 'Rendering', function() {
      var greeting = $('#greeting');
      // Hero should show a project name and relative time, NOT "no sessions"
      return greeting.textContent.indexOf('last in') !== -1;
    });

    assert('Hero line skips in-progress entries', 'Rendering', function() {
      var greeting = $('#greeting');
      // The most recent entries are in-progress, so hero should show a completed project
      // It should NOT show "test-project" which is the in-progress project
      // (unless test-project also has completed entries)
      return greeting.textContent.indexOf('last in') !== -1;
    });

    assert('Last Touched shows one entry per project', 'Rendering', function() {
      var ltEntries = $$('.lt-entry');
      var projects = ltEntries.map(function(e) { return e.dataset.project; });
      var unique = projects.filter(function(p, i) { return projects.indexOf(p) === i; });
      return ltEntries.length > 0 && ltEntries.length === unique.length;
    });

    assert('Day groups present', 'Rendering', function() {
      var groups = $$('.day-group');
      return groups.length > 0;
    });

    assert('In-progress entries have .in-progress class', 'Rendering', function() {
      var inProgress = $$('.entry.in-progress');
      return inProgress.length > 0;
    });

    assert('In-progress entries show "now" in time column', 'Rendering', function() {
      var ip = $('.entry.in-progress .time');
      return ip && ip.textContent.trim() === 'now';
    });

    assert('Stale entries have .stale class', 'Rendering', function() {
      var stale = $$('.entry.stale');
      return stale.length > 0;
    });

    assert('Worktree entries show worktree tag', 'Rendering', function() {
      var tags = $$('.wt-tag');
      return tags.length > 0;
    });

    assert('Verb highlighting present', 'Rendering', function() {
      var verbs = $$('.verb');
      return verbs.length > 0;
    });

    assert('Session color set on entries', 'Rendering', function() {
      var entry = $('.entry');
      var color = entry.style.getPropertyValue('--session-color');
      return color && color !== 'transparent';
    });

    assert('Filter pills rendered for projects', 'Rendering', function() {
      var pills = $$('.pill');
      return pills.length > 1; // "All" + at least one project
    });

    assert('Special chars in project name escaped correctly', 'Rendering', function() {
      // "my-app (v2)" should appear as text, not cause HTML injection
      var projects = $$('.project');
      var found = projects.some(function(p) { return p.textContent.indexOf('(v2)') !== -1; });
      return found;
    });

    // ===== INTERACTIONS =====

    assert('Click entry opens peek popover', 'Interactions', function() {
      var entry = $$('.entry').find(function(e) { return !e.classList.contains('in-progress') && !e.classList.contains('stale'); });
      if (!entry) return false;
      simulateClick(entry);
      var peek = doc.querySelector('.peek');
      return peek !== null;
    });

    assert('Peek shows prompt text', 'Interactions', function() {
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var prompt = peek.querySelector('.peek-prompt');
      return prompt && prompt.textContent.length > 0;
    });

    assert('Peek shows response text for completed entry', 'Interactions', function() {
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var response = peek.querySelector('.peek-response');
      return response && response.textContent.length > 0;
    });

    assert('Peek shows effort summary for completed entry', 'Interactions', function() {
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var effort = peek.querySelector('.peek-effort');
      return effort && effort.textContent.indexOf('tool calls') !== -1;
    });

    assert('Peek has resume button', 'Interactions', function() {
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var btn = peek.querySelector('.btn-resume');
      return btn !== null;
    });

    // Close peek via Escape
    assert('Escape closes peek', 'Interactions', function() {
      simulateKey('Escape');
      var peek = doc.querySelector('.peek');
      return peek === null;
    });

    // Click another entry to reopen peek, then click backdrop
    assert('Click outside peek closes it', 'Interactions', function() {
      var entry = $$('.entry')[2];
      if (!entry) return false;
      simulateClick(entry);
      var backdrop = doc.querySelector('.peek-backdrop');
      if (!backdrop) return false;
      simulateClick(backdrop);
      return doc.querySelector('.peek') === null;
    });

    // Click two entries rapidly
    assert('Rapid click switches peek to new entry', 'Interactions', function() {
      var entries = $$('.entry');
      if (entries.length < 3) return false;
      simulateClick(entries[0]);
      simulateClick(entries[2]);
      var peeks = doc.querySelectorAll('.peek');
      return peeks.length === 1; // only one peek at a time
    });

    // Clean up peek
    simulateKey('Escape');

    // Peek on in-progress entry
    assert('Peek on in-progress shows "working" message', 'Interactions', function() {
      var ip = doc.querySelector('.entry.in-progress');
      if (!ip) return false;
      simulateClick(ip);
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var working = peek.querySelector('.peek-working');
      var result = working && working.textContent.indexOf('working') !== -1;
      simulateKey('Escape');
      return result;
    });

    // Peek on stale entry
    assert('Peek on stale shows "status unknown"', 'Interactions', function() {
      var stale = doc.querySelector('.entry.stale');
      if (!stale) return false;
      simulateClick(stale);
      var peek = doc.querySelector('.peek');
      if (!peek) return false;
      var working = peek.querySelector('.peek-working');
      var result = working && working.textContent.indexOf('unknown') !== -1;
      simulateKey('Escape');
      return result;
    });

    // Filter pill
    assert('Filter pill click toggles filter', 'Interactions', function() {
      var pills = $$('.pill:not([data-filter="all"])');
      if (pills.length === 0) return false;
      simulateClick(pills[0]);
      var isActive = pills[0].classList.contains('active');
      var allPill = $('[data-filter="all"]');
      var allInactive = !allPill.classList.contains('active');
      // Reset
      simulateClick(allPill);
      return isActive && allInactive;
    });

    assert('"All" pill clears other selections', 'Interactions', function() {
      var pills = $$('.pill:not([data-filter="all"])');
      if (pills.length === 0) return false;
      simulateClick(pills[0]);
      var allPill = $('[data-filter="all"]');
      simulateClick(allPill);
      var otherActive = $$('.pill.active:not([data-filter="all"])');
      return allPill.classList.contains('active') && otherActive.length === 0;
    });

    assert('Search filters entries by prompt text', 'Interactions', function() {
      var search = $('#search');
      search.value = 'terraform';
      search.dispatchEvent(new Event('input', { bubbles: true }));
      var visible = $$('.entry:not(.hidden)');
      var allMatch = visible.every(function(e) {
        return e.querySelector('.prompt-text').textContent.toLowerCase().indexOf('terraform') !== -1;
      });
      // Clear
      search.value = '';
      search.dispatchEvent(new Event('input', { bubbles: true }));
      return visible.length > 0 && allMatch;
    });

    // ===== KEYBOARD =====

    assert('j/k navigates entries', 'Keyboard', function() {
      simulateKey('j');
      var focused = doc.querySelector('.entry.focused');
      if (!focused) return false;
      simulateKey('j');
      var focused2 = doc.querySelector('.entry.focused');
      return focused2 && focused2 !== focused;
    });

    // Clear focus
    simulateKey('Escape');

    assert('/ focuses search input', 'Keyboard', function() {
      simulateKey('/');
      var search = $('#search');
      return doc.activeElement === search;
    });

    // Blur search
    $('#search').blur();

    assert('? opens keyboard overlay', 'Keyboard', function() {
      simulateKey('?');
      var overlay = $('#kb-overlay');
      var visible = overlay.classList.contains('show');
      // Close it
      simulateKey('?');
      return visible;
    });

    // ===== STATE =====

    assert('Theme stored in localStorage', 'State', function() {
      var stored = win.localStorage.getItem('ca-theme');
      return stored !== null;
    });

    assert('Resume button has correct command format', 'State', function() {
      var btn = $('.btn-resume');
      if (!btn) return false;
      var cwd = btn.dataset.cwd;
      var session = btn.dataset.session;
      return cwd && session && cwd.length > 0 && session.length > 0;
    });

    assert('Duration badge present on hover-capable entries', 'State', function() {
      var badges = $$('.badge-duration');
      return badges.length > 0;
    });

    // ===== PEEK ON LAST TOUCHED =====

    assert('Click Last Touched entry opens peek', 'Interactions', function() {
      var ltEntry = doc.querySelector('.lt-entry');
      if (!ltEntry) return false;
      simulateClick(ltEntry);
      var peek = doc.querySelector('.peek');
      var result = peek !== null;
      simulateKey('Escape');
      return result;
    });

    // Done
    renderResults();
  }

  frame.addEventListener('load', function() {
    waitForDashboard(runTests);
  });
})();
</script>
</body>
</html>
